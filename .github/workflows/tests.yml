name: CI - Tests & linting

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run tests & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Run Type Checking
        run: npm run type-check

      - name: Run Coverage
        run: npm run test:coverage || echo "Coverage check failed but not blocking"

      - name: Notify Discord on Failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "🚨 CI FAILED!",
              "description": "**Les tests ont échoué sur _portfolio-nuxt_** ❌",
              "color": 16711680,
              "fields": [
                {
                  "name": "Commit",
                  "value": "${{ github.event.head_commit.message }}",
                  "inline": true
                },
                {
                  "name": "Branch",
                  "value": "${{ github.ref_name }}",
                  "inline": true
                },
                {
                  "name": "Logs",
                  "value": "[Voir les logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
                }
              ],
              "footer": {
                "text": "GitHub Actions - $(date +%Y-%m-%d %H:%M:%S)"
              }
            }]
          }'


      - name: Notify Discord on Success
        if: success()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "✅ CI SUCCESS!",
              "description": "**Tous les tests sont passés sur _portfolio-nuxt_ 🎉**",
              "color": 3066993,
              "fields": [
                {
                  "name": "Commit",
                  "value": "${{ github.event.head_commit.message }}",
                  "inline": true
                },
                {
                  "name": "Branch",
                  "value": "${{ github.ref_name }}",
                  "inline": true
                },
                {
                  "name": "Logs",
                  "value": "[Voir les logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
                }
              ],
              "footer": {
                "text": "GitHub Actions - $(date +%Y-%m-%d %H:%M:%S)"
              }
            }]
          }'

